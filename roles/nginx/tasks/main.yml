- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    update_cache: true
  tags: [prereq]

- name: Ensure includes dir exists
  ansible.builtin.file:
    path: /etc/nginx/includes
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [prereq]

- name: Provision proxy-tunes.conf from template
  ansible.builtin.template:
    src: proxy-tunes.conf.j2
    dest: /etc/nginx/includes/proxy-tunes.conf
    owner: root
    group: root
    mode: "0644"
  notify: reload nginx
  tags: [prereq]
